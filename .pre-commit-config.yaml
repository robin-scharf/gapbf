repos:
  - repo: local
    hooks:
      - id: line-length-check
        name: line length check
        entry: uv run python scripts/check_line_length.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy-src
        name: mypy src
        entry: uv run mypy src
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
