<section class="panel panel-log">
  <div class="section-head">
    <div>
      <p class="section-label">Log</p>
      <h2>Recent responses</h2>
    </div>
    <div class="panel-actions">
      <button id="downloadCsvButton" class="button button-ghost" type="button">Download CSV</button>
    </div>
  </div>

  <div class="log-table-wrap">
    <table class="log-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Path</th>
          <th>Result</th>
          <th>Response</th>
        </tr>
      </thead>
      <tbody id="logTableBody">
        <tr>
          <td colspan="4" class="empty-cell">No attempts yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
