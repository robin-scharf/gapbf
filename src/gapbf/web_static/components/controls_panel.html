<section class="panel panel-controls">
  <div class="section-head">
    <div>
      <p class="section-label">Controls</p>
      <h2>Run controls</h2>
    </div>
  </div>

  <div class="controls-row">
    <button id="calculateTotalPathsButton" class="button button-ghost" type="button">Calculate</button>
    <button id="startButton" class="button button-start">Start</button>
    <button id="pauseButton" class="button button-ghost" disabled>Pause</button>
    <button id="resumeButton" class="button button-ghost" disabled>Resume</button>
    <button id="stopButton" class="button button-stop" disabled>Stop</button>
    <button id="resetButton" class="button button-ghost" type="button">Reset</button>
  </div>
</section>
